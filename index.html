<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마법의 분수 공방</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        
        body {
            font-family: 'Jua', 'Comic Sans MS', sans-serif;
            background: radial-gradient(circle at center, #3b185f, #1a0b2e);
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        /* Fraction Component */
        .fraction {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            vertical-align: middle;
            margin: 0 4px;
            font-weight: bold;
            line-height: 1.1;
        }
        .numerator {
            border-bottom: 2px solid currentColor;
            padding: 0 6px;
            width: 100%;
            text-align: center;
        }
        .denominator {
            padding: 0 6px;
        }

        /* Bottle Styles */
        #bottle-neck {
            width: 60px;
            height: 40px;
            border: 6px solid rgba(255,255,255,0.7);
            border-bottom: none;
            border-radius: 12px 12px 0 0;
            margin: 0 auto;
            background: rgba(255,255,255,0.05);
            position: relative;
            z-index: 10;
        }
        #bottle-neck::after {
            content: '';
            position: absolute;
            top: -12px; left: -14px; right: -14px;
            height: 16px;
            border: 6px solid rgba(255,255,255,0.8);
            border-radius: 10px;
            background: rgba(255,255,255,0.3);
        }
        #bottle-body {
            width: 160px;
            height: 350px;
            border: 6px solid rgba(255,255,255,0.7);
            border-top: none;
            border-radius: 0 0 30px 30px;
            position: relative;
            background: rgba(255,255,255,0.05);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.2), 0 10px 20px rgba(0,0,0,0.5);
        }
        #liquid-wrapper {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 0 0 24px 24px;
            overflow: hidden;
        }
        #liquid-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column-reverse;
        }
        .liquid-layer {
            width: 100%;
            flex-shrink: 0;
            transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-top: 3px solid rgba(255,255,255,0.5);
            opacity: 0.9;
        }
        
        /* Markings */
        #markings-container {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }
        .marking {
            flex: 1;
            position: relative;
        }
        .marking:not(:last-child) {
            border-bottom: 2px dashed rgba(255, 255, 255, 0.8);
        }
        .marking-label {
            position: absolute;
            bottom: -16px;
            right: -75px;
            color: white;
            font-size: 1.1rem;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Modal Overlay */
        #overlay {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        #modal {
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #overlay.active #modal {
            transform: scale(1);
        }
        #modal-msg {
            white-space: pre-line;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            #bottle-body {
                width: 150px;
                height: 220px;
            }
            #bottle-neck {
                width: 52px;
                height: 32px;
            }
            #bottle-neck::after {
                top: -10px; left: -12px; right: -12px;
                height: 14px;
            }
            #app {
                padding: 0.75rem !important;
                margin-top: 0 !important;
                border-radius: 1rem !important;
            }
        }

        /* Utility */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 sm:p-8">

    <!-- Home Screen -->
    <div id="home-screen" class="flex flex-col items-center justify-center p-4 min-h-screen relative overflow-hidden">
        <!-- Background Image -->
        <div class="absolute inset-0 z-0 bg-cover bg-center bg-no-repeat" style="background-image: url('background.png');"></div>
        <!-- Dark overlay for text readability -->
        <div class="absolute inset-0 bg-black/45 z-10"></div>
        
        <!-- Title and Buttons -->
        <div class="relative z-20 flex flex-col items-center">
            <h1 class="text-5xl sm:text-7xl font-black text-yellow-300 drop-shadow-[0_5px_15px_rgba(0,0,0,0.9)] mb-12 text-center">마법의 분수 공방 🧪</h1>
            <div class="flex flex-col gap-6 w-full max-w-md px-6">
                <button onclick="startGame()" class="bg-green-500 hover:bg-green-400 text-white font-bold py-5 px-8 rounded-2xl border-2 border-white shadow-[0_8px_0_#2e7d32] active:translate-y-2 active:shadow-none transition-all text-2xl cursor-pointer">
                    게임 시작하기
                </button>
                <button onclick="showInstructions()" class="bg-blue-500 hover:bg-blue-400 text-white font-bold py-5 px-8 rounded-2xl border-2 border-white shadow-[0_8px_0_#1e40af] active:translate-y-2 active:shadow-none transition-all text-2xl cursor-pointer">
                    게임 방법
                </button>
            </div>
        </div>
    </div>

    <!-- Game Instructions Modal -->
    <div id="instructions-overlay" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 hidden">
        <div class="bg-purple-900 border-4 border-yellow-400 rounded-3xl p-8 max-w-lg w-full text-center shadow-[0_0_40px_rgba(255,215,0,0.3)] mx-4 max-h-[80vh] overflow-y-auto">
            <h2 class="text-3xl font-bold mb-6 text-yellow-300">게임 방법</h2>
            <div class="text-left text-xl leading-relaxed space-y-5 mb-8 text-white font-normal">
                <p>1. 레시피에 적힌 분수만큼 재료를 정확히 채워주세요!</p>
                <p>2. 오른쪽 재료 버튼을 눌러 물약을 넣을 수 있어요.</p>
                <p>3. 정확히 채우면 성공, 너무 많이 넣으면 실패해요.</p>
            </div>
            <button onclick="closeInstructions()" class="bg-yellow-400 hover:bg-yellow-300 text-purple-900 font-black text-2xl py-3 px-8 rounded-xl border-2 border-white shadow-[0_5px_0_#b39700] active:translate-y-1 active:shadow-none transition-all w-full cursor-pointer">
                돌아가기
            </button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="app" class="w-full max-w-5xl bg-white/10 rounded-3xl p-3 sm:p-6 md:p-10 backdrop-blur-md shadow-2xl border border-white/20 mt-0 sm:mt-4 hidden">
        <header class="text-center mb-4 sm:mb-6 md:mb-10 flex flex-col items-center">
            <h1 class="text-3xl sm:text-4xl md:text-5xl font-black text-yellow-300 drop-shadow-lg mb-2 sm:mb-4">마법의 분수 공방 🧪</h1>
            <div class="flex flex-col gap-2 sm:gap-4 w-full max-w-xl items-center">
                <!-- Row 1: Level and Lives -->
                <div class="flex items-center justify-center gap-3 sm:gap-4 w-full">
                    <div class="inline-block bg-purple-900/80 px-4 sm:px-6 py-1.5 sm:py-2 rounded-full border border-purple-400 shrink-0">
                        <h2 id="level-title" class="text-xl sm:text-2xl font-bold text-white tracking-wide">레벨 1</h2>
                    </div>
                    <div id="lives-container" class="bg-black/30 px-4 sm:px-5 py-1.5 sm:py-2 rounded-full border border-white/20 text-xl sm:text-2xl tracking-wide shrink-0 flex items-center justify-center" aria-label="남은 기회">
                        <span class="text-red-500 mx-0.5">♥</span>
                        <span class="text-red-500 mx-0.5">♥</span>
                        <span class="text-red-500 mx-0.5">♥</span>
                    </div>
                </div>
                <!-- Row 2: Time bar below Level and Lives -->
                <div class="w-full bg-gray-700/50 rounded-full h-7 sm:h-8 overflow-hidden border border-white/20 relative flex items-center p-1 mt-0 sm:mt-1">
                    <div id="timer-bar" class="bg-green-500 h-5 sm:h-6 rounded-full transition-all duration-100 ease-linear" style="width: 100%;"></div>
                    <span id="timer-text" class="absolute inset-0 flex items-center justify-center text-xs sm:text-sm font-bold text-white drop-shadow-md">남은 시간: 15.0초</span>
                </div>
            </div>
        </header>

        <main class="flex flex-col md:flex-row gap-4 sm:gap-6 md:gap-8 items-center md:items-stretch justify-center">
            <!-- Order Book -->
            <aside class="order-1 bg-black/40 rounded-2xl p-4 sm:p-6 border border-white/20 shadow-xl flex-1 w-full md:w-auto flex flex-col items-center justify-center min-h-[140px] sm:min-h-[200px]">
                <h3 class="text-yellow-400 text-2xl sm:text-3xl mb-3 sm:mb-6 text-center drop-shadow-md">📜 레시피</h3>
                <p id="target-text" class="text-xl sm:text-2xl text-center leading-relaxed font-bold">
                    재료를 ... 만큼 정확히 채워주세요!
                </p>
            </aside>

            <!-- Bottle Area -->
            <section class="order-3 md:order-2 flex flex-col items-center justify-center flex-[1.5] w-full py-2 sm:py-4">
                <div id="bottle" class="mb-4 sm:mb-10 mx-4 sm:mx-16">
                    <div id="bottle-neck"></div>
                    <div id="bottle-body">
                        <div id="liquid-wrapper">
                            <div id="liquid-container"></div>
                        </div>
                        <div id="markings-container"></div>
                    </div>
                </div>
                
                <div class="flex gap-3 sm:gap-4 w-full justify-center px-4">
                    <button id="complete-btn" onclick="checkResult()" class="flex-1 max-w-[140px] sm:max-w-[160px] bg-green-500 hover:bg-green-400 text-white font-bold py-2 sm:py-3 px-3 sm:px-4 rounded-xl border-2 border-white shadow-[0_5px_0_#2e7d32] active:translate-y-1 active:shadow-none transition-all text-lg sm:text-xl cursor-pointer">
                        제조 완료!
                    </button>
                    <button id="reset-btn" onclick="resetBottle()" class="flex-1 max-w-[100px] sm:max-w-[120px] bg-red-500 hover:bg-red-400 text-white font-bold py-2 sm:py-3 px-3 sm:px-4 rounded-xl border-2 border-white shadow-[0_5px_0_#b71c1c] active:translate-y-1 active:shadow-none transition-all text-lg sm:text-xl cursor-pointer">
                        비우기 🗑️
                    </button>
                </div>
            </section>

            <!-- Ingredients -->
            <aside class="order-2 md:order-3 bg-black/40 rounded-2xl p-4 sm:p-6 border border-white/20 shadow-xl flex-1 w-full md:w-auto">
                <h3 class="text-yellow-400 text-2xl sm:text-3xl mb-3 sm:mb-6 text-center drop-shadow-md">🧪 재료</h3>
                <div id="buttons-container" class="flex flex-wrap md:flex-col gap-3 sm:gap-4 justify-center">
                    <!-- Buttons injected via JS -->
                </div>
            </aside>
        </main>

        <!-- Go Back Button -->
        <div class="mt-4 sm:mt-8 text-center">
            <button onclick="goHome()" class="text-sm text-white/70 hover:text-white underline cursor-pointer">돌아가기</button>
        </div>
    </div>

    <!-- Result Modal Overlay -->
    <div id="overlay" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div id="modal" class="bg-purple-900 border-4 border-yellow-400 rounded-3xl p-8 max-w-md w-full text-center shadow-[0_0_40px_rgba(255,215,0,0.3)] mx-4 flex flex-col items-center">
            <h2 id="modal-msg" class="text-3xl font-bold mb-8 leading-snug text-white w-full"></h2>
            <div id="modal-btn-group" class="flex flex-col gap-4 w-full">
                <button id="next-btn" class="bg-yellow-400 hover:bg-yellow-300 text-purple-900 font-black text-2xl py-3 px-8 rounded-xl border-2 border-white shadow-[0_5px_0_#b39700] active:translate-y-1 active:shadow-none transition-all w-full cursor-pointer">
                    다음으로
                </button>
                <button id="modal-home-btn" class="bg-blue-500 hover:bg-blue-400 text-white font-black text-2xl py-3 px-8 rounded-xl border-2 border-white shadow-[0_5px_0_#1e40af] active:translate-y-1 active:shadow-none transition-all w-full cursor-pointer hidden">
                    홈으로 돌아가기 🏠
                </button>
            </div>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let bgmOscillators = [];
        let bgmGain = null;
        let isBGMPlaying = false;

        let bgmIntervalId = null;
        let bgmStep = 0;

        function playBGM() {
            if (isBGMPlaying) return;
            isBGMPlaying = true;
            
            // Bright, friendly pentatonic melody for a magical potion shop
            const melody = [
                523.25, 659.25, 783.99, 880.00,  // C5, E5, G5, A5
                659.25, 783.99, 1046.50, 880.00, // E5, G5, C6, A5
                587.33, 698.46, 880.00, 987.77,  // D5, F5, A5, B5
                783.99, 880.00, 1174.66, 987.77  // G5, A5, D6, B5
            ];
            
            const bgmGainNode = audioCtx.createGain();
            bgmGainNode.connect(audioCtx.destination);
            bgmGainNode.gain.setValueAtTime(0.12, audioCtx.currentTime); // Optimized volume for clarity
            
            function playStep() {
                if (!isBGMPlaying) return;
                
                const now = audioCtx.currentTime;
                const freq = melody[bgmStep % melody.length];
                
                // Celeste/Music-box style synthesizer
                const osc = audioCtx.createOscillator();
                const noteGain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now);
                
                // Clear attack and smooth release
                noteGain.gain.setValueAtTime(0, now);
                noteGain.gain.linearRampToValueAtTime(0.3, now + 0.04);
                noteGain.gain.exponentialRampToValueAtTime(0.001, now + 0.7);
                
                osc.connect(noteGain);
                noteGain.connect(bgmGainNode);
                
                osc.start(now);
                osc.stop(now + 0.8);
                bgmOscillators.push(osc);
                
                // Soft warm bass pad on the first beat of each bar
                if (bgmStep % 4 === 0) {
                    const bassFreq = freq / 4; // 2 octaves down
                    const bassOsc = audioCtx.createOscillator();
                    const bassGain = audioCtx.createGain();
                    
                    bassOsc.type = 'triangle';
                    bassOsc.frequency.setValueAtTime(bassFreq, now);
                    
                    bassGain.gain.setValueAtTime(0, now);
                    bassGain.gain.linearRampToValueAtTime(0.12, now + 0.08);
                    bassGain.gain.exponentialRampToValueAtTime(0.001, now + 1.4);
                    
                    bassOsc.connect(bassGain);
                    bassGain.connect(bgmGainNode);
                    
                    bassOsc.start(now);
                    bassOsc.stop(now + 1.5);
                    bgmOscillators.push(bassOsc);
                }
                
                bgmStep++;
                
                // Memory cleanup
                setTimeout(() => {
                    bgmOscillators = bgmOscillators.filter(o => o !== osc);
                }, 1000);
            }
            
            // 450ms tempo for a cheerful yet relaxed feel
            bgmIntervalId = setInterval(playStep, 450);
        }

        function stopBGM() {
            isBGMPlaying = false;
            clearInterval(bgmIntervalId);
            bgmOscillators.forEach(osc => {
                try { osc.stop(); } catch(e) {}
            });
            bgmOscillators = [];
        }

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            if (type === 'success') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, now);
                osc.frequency.exponentialRampToValueAtTime(1046.50, now + 0.1);
                gainNode.gain.setValueAtTime(0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            } else if (type === 'fail') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'pour') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.linearRampToValueAtTime(600, now + 0.1);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.linearRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'gameover') {
                // Sad descending sound for game over
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(150, now + 0.8);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                osc.start(now);
                osc.stop(now + 0.8);
            } else if (type === 'gameclear') {
                // Joyful fanfare for game clear
                const notes = [523.25, 659.25, 783.99, 1046.50, 783.99, 1046.50];
                notes.forEach((freq, i) => {
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(freq, now + i * 0.12);
                    gain2.gain.setValueAtTime(0.4, now + i * 0.12);
                    gain2.gain.exponentialRampToValueAtTime(0.01, now + i * 0.12 + 0.4);
                    osc2.start(now + i * 0.12);
                    osc2.stop(now + i * 0.12 + 0.4);
                });
            }
        }

        function createSparkles() {
            const app = document.getElementById('bottle');
            const rect = app.getBoundingClientRect();
            const emojis = ['✨', '⭐'];
            
            // Highly simplified: Only 6 minimal sparkles
            for (let i = 0; i < 6; i++) {
                const sparkle = document.createElement('div');
                sparkle.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                sparkle.style.position = 'fixed';
                const x = rect.left + rect.width / 2 + (Math.random() - 0.5) * 100;
                const y = rect.top + rect.height / 2 + (Math.random() - 0.5) * 100;
                sparkle.style.left = `${x}px`;
                sparkle.style.top = `${y}px`;
                sparkle.style.fontSize = `1rem`;
                sparkle.style.pointerEvents = 'none';
                sparkle.style.zIndex = '1000';
                
                document.body.appendChild(sparkle);
                
                // Even tighter and faster movement
                sparkle.animate([
                    { transform: 'translateY(0) scale(0)', opacity: 0 },
                    { transform: 'translateY(-15px) scale(1)', opacity: 1, offset: 0.5 },
                    { transform: 'translateY(-30px) scale(0)', opacity: 0 }
                ], {
                    duration: 600 + Math.random() * 300,
                    easing: 'ease-out'
                });
                
                setTimeout(() => sparkle.remove(), 900);
            }
        }

        function createFinalSparkles() {
            const app = document.getElementById('bottle');
            const rect = app.getBoundingClientRect();
            const emojis = ['✨', '⭐', '🌟'];
            
            // Clean burst effect only - no spinning emojis
            for (let i = 0; i < 30; i++) {
                const sparkle = document.createElement('div');
                sparkle.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                sparkle.style.position = 'fixed';
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 60 + Math.random() * 120;
                const targetX = Math.cos(angle) * distance;
                const targetY = Math.sin(angle) * distance - 60;
                
                const x = rect.left + rect.width / 2 + (Math.random() - 0.5) * 40;
                const y = rect.top + rect.height / 2 + (Math.random() - 0.5) * 40;
                
                sparkle.style.left = `${x}px`;
                sparkle.style.top = `${y}px`;
                sparkle.style.fontSize = `${1 + Math.random() * 1.2}rem`;
                sparkle.style.pointerEvents = 'none';
                sparkle.style.zIndex = '1000';
                
                document.body.appendChild(sparkle);
                
                sparkle.animate([
                    { transform: 'translate(0, 0) scale(0)', opacity: 0 },
                    { transform: `translate(${targetX * 0.5}px, ${targetY * 0.5}px) scale(1.2)`, opacity: 1, offset: 0.4 },
                    { transform: `translate(${targetX}px, ${targetY}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 800 + Math.random() * 600,
                    easing: 'ease-out'
                });
                
                setTimeout(() => sparkle.remove(), 1500);
            }
        }

        const levels = [
            // Level 1: 기초 - 같은 분모(1/3) 더하기 [색상: 빨간 물약, 노란 물약]
            {
                target: { n: 2, d: 3 },
                markings: 3,
                ingredients: [
                    { n: 1, d: 3, color: '#ef4444', name: '빨간 물약' },
                    { n: 1, d: 3, color: '#eab308', name: '노란 물약' }
                ]
            },
            // Level 2: 같은 분모(1/4) 단순 더하기 [색상: 파란 물약, 분홍 물약]
            {
                target: { n: 3, d: 4 },
                markings: 4,
                ingredients: [
                    { n: 1, d: 4, color: '#3b82f6', name: '파란 물약' },
                    { n: 2, d: 4, color: '#ec4899', name: '분홍 물약' }
                ]
            },
            // Level 3: 1/5 단위 분수 더하기 [색상: 초록 물약, 보라 물약]
            {
                target: { n: 4, d: 5 },
                markings: 5,
                ingredients: [
                    { n: 1, d: 5, color: '#22c55e', name: '초록 물약' },
                    { n: 2, d: 5, color: '#a855f7', name: '보라 물약' }
                ]
            },
            // Level 4: 1/6 분수 조합 [색상: 하늘 물약, 주황 물약, 자주 물약]
            {
                target: { n: 5, d: 6 },
                markings: 6,
                ingredients: [
                    { n: 1, d: 6, color: '#06b6d4', name: '하늘 물약' },
                    { n: 2, d: 6, color: '#f97316', name: '주황 물약' },
                    { n: 3, d: 6, color: '#d946ef', name: '자주 물약' }
                ]
            },
            // Level 5: 다른 분모(1/2와 1/4) [색상: 자연 물약, 빨간 물약]
            {
                target: { n: 1, d: 2 },
                markings: 8,
                ingredients: [
                    { n: 1, d: 4, color: '#84cc16', name: '자연 물약' },
                    { n: 1, d: 8, color: '#ef4444', name: '빨간 물약' }
                ]
            },
            // Level 6: 다른 분모 조합 (1/2 + 1/4 = 3/4) [색상: 심해 물약, 노란 물약, 파란 물약]
            {
                target: { n: 3, d: 4 },
                markings: 8,
                ingredients: [
                    { n: 1, d: 2, color: '#6366f1', name: '심해 물약' },
                    { n: 1, d: 4, color: '#eab308', name: '노란 물약' },
                    { n: 1, d: 8, color: '#3b82f6', name: '파란 물약' }
                ]
            },
            // Level 7: 1/8 분수와의 조합 [색상: 민트 물약, 화염 물약, 보라 물약]
            {
                target: { n: 7, d: 8 },
                markings: 8,
                ingredients: [
                    { n: 1, d: 2, color: '#10b981', name: '민트 물약' },
                    { n: 1, d: 4, color: '#f43f5e', name: '화염 물약' },
                    { n: 1, d: 8, color: '#a855f7', name: '보라 물약' }
                ]
            },
            // Level 8: 1/10 단위 분수 [색상: 청록 물약, 태양 물약, 분홍 물약]
            {
                target: { n: 7, d: 10 },
                markings: 10,
                ingredients: [
                    { n: 1, d: 10, color: '#14b8a6', name: '청록 물약' },
                    { n: 2, d: 10, color: '#f59e0b', name: '태양 물약' },
                    { n: 3, d: 10, color: '#ec4899', name: '분홍 물약' }
                ]
            },
            // Level 9: 함정 재료 [색상: 하늘 물약, 초록 물약, 자주 물약, 주황 물약]
            {
                target: { n: 5, d: 6 },
                markings: 12,
                ingredients: [
                    { n: 1, d: 12, color: '#06b6d4', name: '하늘 물약' },
                    { n: 1, d: 6, color: '#22c55e', name: '초록 물약' },
                    { n: 1, d: 4, color: '#d946ef', name: '자주 물약' },
                    { n: 1, d: 3, color: '#f97316', name: '주황 물약' }
                ]
            },
            // Level 10: 최종 보스 [색상: 화염 물약, 자연 물약, 심해 물약, 노란 물약]
            {
                target: { n: 1, d: 1 },
                markings: 12,
                ingredients: [
                    { n: 1, d: 12, color: '#f43f5e', name: '화염 물약' },
                    { n: 1, d: 6, color: '#84cc16', name: '자연 물약' },
                    { n: 1, d: 4, color: '#6366f1', name: '심해 물약' },
                    { n: 1, d: 3, color: '#eab308', name: '노란 물약' }
                ]
            }
        ];

        let currentAmount = 0;
        let currentLevelIndex = 0;
        let timerInterval = null;
        const TIME_LIMIT = 15;
        let timeLeft = TIME_LIMIT;
        let lives = 3;
        let roundLocked = false;
        let mixedLevels = new Set();
        let currentLevelIngredients = new Set();

        function renderFraction(n, d) {
            if (n === d && n === 1) return `<span style="font-size: 1.2em; font-weight: 900; vertical-align: middle; margin: 0 4px;">가득(1)</span>`;
            return `<div class="fraction">
                <span class="numerator">${n}</span>
                <span class="denominator">${d}</span>
            </div>`;
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = TIME_LIMIT;
            updateTimerUI();
            
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    clearInterval(timerInterval);
                    handleTimeout();
                }
                updateTimerUI();
            }, 100);
        }

        function stopTimer() {
            clearInterval(timerInterval);
        }

        function updateTimerUI() {
            const bar = document.getElementById('timer-bar');
            const text = document.getElementById('timer-text');
            if (bar && text) {
                const percentage = (timeLeft / TIME_LIMIT) * 100;
                bar.style.width = `${percentage}%`;
                text.innerText = `남은 시간: ${timeLeft.toFixed(1)}초`;
                
                // Color change based on time remaining
                if (percentage < 30) {
                    bar.className = "bg-red-500 h-5 rounded-full transition-all duration-100 ease-linear";
                } else if (percentage < 60) {
                    bar.className = "bg-yellow-500 h-5 rounded-full transition-all duration-100 ease-linear";
                } else {
                    bar.className = "bg-green-500 h-5 rounded-full transition-all duration-100 ease-linear";
                }
            }
        }

        function handleTimeout() {
            playSound('fail');
            loseLife("시간이 다 되었어요!\n다시 도전해볼까요?");
        }

        function updateLivesUI() {
            const container = document.getElementById('lives-container');
            if (!container) return;
            container.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const heart = document.createElement('span');
                heart.textContent = i < lives ? '♥' : '♡';
                heart.className = i < lives ? 'text-red-500 mx-0.5' : 'text-white/50 mx-0.5';
                container.appendChild(heart);
            }
        }

        function loseLife(message) {
            stopTimer();
            roundLocked = true;
            lives = Math.max(0, lives - 1);
            updateLivesUI();

            if (lives <= 0) {
                showGameOverModal();
            } else {
                showModal(message, true, false);
            }
        }

        function resetGameState() {
            currentLevelIndex = 0;
            lives = 3;
            mixedLevels = new Set();
            currentLevelIngredients = new Set();
            updateLivesUI();
            stopBGM();
            playBGM();
            loadLevel(0);
        }

        function loadLevel(index) {
            const level = levels[index];
            roundLocked = false;
            currentLevelIngredients = new Set();
            document.getElementById('level-title').innerText = `레벨 ${index + 1}`;
            updateLivesUI();
            
            const isFull = (level.target.n === level.target.d);
            const suffix = isFull ? '<br>' : ' 만큼<br>정확히 ';
            document.getElementById('target-text').innerHTML = `재료를 <span class="text-yellow-300 mx-1 text-3xl">${renderFraction(level.target.n, level.target.d)}</span>${suffix}채워주세요!`;
            
            const markingsContainer = document.getElementById('markings-container');
            markingsContainer.innerHTML = '';
            const isMobile = window.innerWidth <= 768;
            
            // 표시할 눈금들을 먼저 결정 (좌우 번갈아 배치를 위해)
            const labelsToShow = [];
            for (let i = 0; i < level.markings - 1; i++) {
                const markNum = level.markings - 1 - i;
                const isTargetMark = (Math.abs(markNum / level.markings - level.target.n / level.target.d) < 0.001);
                
                let shouldShow;
                if (level.markings <= 6) {
                    shouldShow = true; // 적은 눈금은 모두 표시
                } else if (level.markings <= 8) {
                    shouldShow = true; // 8개도 모두 표시
                } else {
                    // 10, 12개 눈금: 데스크탑은 짝수+정답, 모바일은 모두 표시
                    if (isMobile) {
                        shouldShow = true;
                    } else {
                        shouldShow = (markNum % 2 === 0) || isTargetMark;
                    }
                }
                
                if (shouldShow) {
                    labelsToShow.push({ index: i, markNum: markNum, isTargetMark: isTargetMark });
                }
            }
            
            // 실제 눈금 div 생성
            for (let i = 0; i < level.markings; i++) {
                const mark = document.createElement('div');
                mark.className = 'marking';
                markingsContainer.appendChild(mark);
            }
            
            // 표시 대상 눈금만 라벨 추가, 좌우 번갈아 배치 (모바일)
            labelsToShow.forEach((item, displayIdx) => {
                const mark = markingsContainer.children[item.index];
                const label = document.createElement('div');
                label.className = 'marking-label';
                label.innerHTML = renderFraction(item.markNum, level.markings);
                
                if (isMobile) {
                    // 모바일: 좌우 번갈아 배치 (표시되는 라벨 순서 기준)
                    label.style.fontSize = '0.72rem';
                    label.style.padding = '1px 3px';
                    label.style.bottom = '-8px';
                    if (displayIdx % 2 === 0) {
                        // 오른쪽
                        label.style.right = '-58px';
                        label.style.left = 'auto';
                    } else {
                        // 왼쪽
                        label.style.left = '-58px';
                        label.style.right = 'auto';
                    }
                } else {
                    // 데스크탑: 기존 오른쪽 고정 스타일
                    if (level.markings >= 10) {
                        label.style.fontSize = '0.75rem';
                        label.style.padding = '1px 3px';
                        label.style.bottom = '-10px';
                        label.style.right = '-65px';
                    } else if (level.markings >= 8) {
                        label.style.fontSize = '0.85rem';
                        label.style.padding = '1px 4px';
                        label.style.bottom = '-12px';
                    }
                }
                
                if (item.isTargetMark) {
                    // 정답 눈금은 노란 테두리로 강조
                    label.style.borderColor = '#facc15';
                    label.style.borderWidth = '2px';
                    label.style.color = '#facc15';
                }
                
                mark.appendChild(label);
            });
            
            const btnContainer = document.getElementById('buttons-container');
            btnContainer.innerHTML = '';
            level.ingredients.forEach(ing => {
                const btn = document.createElement('button');
                btn.className = 'relative overflow-hidden border-2 border-white rounded-xl py-3 px-6 text-white font-bold text-xl cursor-pointer shadow-[0_5px_0_rgba(0,0,0,0.5)] active:translate-y-1 active:shadow-none transition-all flex flex-col items-center gap-2 drop-shadow-md hover:brightness-110 flex-1 md:flex-none min-w-[120px]';
                btn.style.backgroundColor = ing.color;
                btn.innerHTML = `<div class="text-2xl">${renderFraction(ing.n, ing.d)}</div>`;
                btn.onclick = () => addLiquid(ing);
                btnContainer.appendChild(btn);
            });
            
            resetBottle();
            startTimer();
        }

        function addLiquid(ing) {
            if (roundLocked) return;
            playSound('pour');
            currentLevelIngredients.add(`${ing.n}/${ing.d}`);
            const value = ing.n / ing.d;
            currentAmount += value;
            
            const liquidContainer = document.getElementById('liquid-container');
            const liquid = document.createElement('div');
            liquid.className = 'liquid-layer';
            liquid.style.backgroundColor = ing.color;
            liquid.style.height = '0%';
            liquidContainer.appendChild(liquid);
            
            requestAnimationFrame(() => {
                liquid.style.height = `${value * 100}%`;
            });
            
            if (currentAmount > 1.0 + 0.001) {
                stopTimer();
                roundLocked = true;
                playSound('fail');
                setTimeout(() => showOverflowModal(), 500);
            }
        }

        function showOverflowModal() {
            loseLife("앗! 재료가 넘쳤어요!\n다시 도전해볼까요?");
        }

        function resetBottle() {
            currentAmount = 0;
            document.getElementById('liquid-container').innerHTML = '';
        }

        function showModal(msg, isRetry, isGameClear = false) {
            stopTimer(); // Always stop timer when modal overlay appears
            const overlay = document.getElementById('overlay');
            const msgEl = document.getElementById('modal-msg');
            const nextBtn = document.getElementById('next-btn');
            const homeBtn = document.getElementById('modal-home-btn');
            
            msgEl.innerText = msg;
            homeBtn.classList.add('hidden'); // Default hide home button
            
            if (isGameClear) {
                // Game Clear: Show both "다시 하기" and "홈으로 돌아가기"
                nextBtn.innerText = "다시 하기";
                nextBtn.onclick = () => {
                    overlay.classList.remove('active');
                    resetGameState();
                };
                
                homeBtn.innerText = "홈으로 돌아가기";
                homeBtn.classList.remove('hidden');
                homeBtn.onclick = () => {
                    overlay.classList.remove('active');
                    goHome();
                };
            } else if (isRetry) {
                nextBtn.innerText = "다시 하기";
                nextBtn.onclick = () => {
                    overlay.classList.remove('active');
                    // Resetting bottle also restarts timer for the level
                    roundLocked = false;
                    resetBottle();
                    startTimer();
                };
            } else {
                nextBtn.innerText = "다음 레벨로!";
                nextBtn.onclick = () => {
                    overlay.classList.remove('active');
                    currentLevelIndex++;
                    loadLevel(currentLevelIndex);
                };
            }
            overlay.classList.add('active');
        }

        function showGameOverModal() {
            stopTimer();
            stopBGM();
            playSound('gameover');
            const overlay = document.getElementById('overlay');
            const msgEl = document.getElementById('modal-msg');
            const nextBtn = document.getElementById('next-btn');
            const homeBtn = document.getElementById('modal-home-btn');

            msgEl.innerText = "게임 오버!\n기회를 모두 사용했어요.";
            nextBtn.innerText = "처음으로 돌아가기";
            nextBtn.onclick = () => {
                overlay.classList.remove('active');
                resetGameState();
            };

            homeBtn.innerText = "홈으로 돌아가기";
            homeBtn.classList.remove('hidden');
            homeBtn.onclick = () => {
                overlay.classList.remove('active');
                goHome();
            };

            overlay.classList.add('active');
        }

        function checkResult() {
            if (roundLocked) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const level = levels[currentLevelIndex];
            const targetAmount = level.target.n / level.target.d;
            
            if (Math.abs(currentAmount - targetAmount) < 0.001) {
                playSound('success');
                
                // Track if this level was cleared with 2+ different ingredient types
                if (currentLevelIngredients.size >= 2) {
                    mixedLevels.add(currentLevelIndex);
                }
                
                if (currentLevelIndex >= levels.length - 1) {
                    createFinalSparkles();
                    stopBGM();
                    playSound('gameclear');
                    // Check if ALL levels were cleared with mixed ingredients
                    const allMixed = mixedLevels.size === levels.length;
                    if (allMixed) {
                        showModal("완벽해!\n분수를 완벽하게\n마스터했어!", false, true);
                    } else {
                        showModal("대단해!\n모든 레벨을 클리어했어!\n다음엔 여러 분수를 섞어서\n클리어 해보자.", false, true);
                    }
                } else {
                    createSparkles();
                    showModal("완벽해!\n원하는 분수를 정확히\n만들었어!", false, false);
                }
            } else if (currentAmount > targetAmount) {
                playSound('fail');
                loseLife("앗! 양이 너무 많아요.\n다시 시도해볼까요?");
            } else {
                playSound('fail');
                loseLife("조금 부족해요.\n다시 시도해볼까요?");
            }
        }

        // Home screen functions
        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            currentLevelIndex = 0;
            lives = 3;
            roundLocked = false;
            mixedLevels = new Set();
            currentLevelIngredients = new Set();
            updateLivesUI();
            playBGM();
            loadLevel(0);
        }

        function goHome() {
            stopTimer();
            stopBGM();
            document.getElementById('app').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
            currentLevelIndex = 0;
            lives = 3;
            roundLocked = false;
            updateLivesUI();
            resetBottle();
        }

        function showInstructions() {
            document.getElementById('instructions-overlay').classList.remove('hidden');
        }

        function closeInstructions() {
            document.getElementById('instructions-overlay').classList.add('hidden');
        }
    </script>
</body>
</html>
